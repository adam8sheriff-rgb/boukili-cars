<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boukili's Cars | Sidi Kacem</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="icon" type="image/jpeg" href="logo.jpg">
</head>
<body>

    <nav class="navbar">
        <img src="logo.jpg" alt="Logo Boukili" class="logo-img">
        <div class="nav-links">
            <a href="#cars">Flotte</a>
            <a href="#contact">Réserver</a>
            <a href="https://wa.me/212665427893" class="btn-wa-nav"><i class="fab fa-whatsapp"></i> Chat</a>
        </div>
    </nav>

    <header class="hero">
        <div class="hero-text" data-aos="fade-right">
            <h1>BOUKILI'S <span class="red">CARS</span></h1>
            <h2>Sidi Kacem - Location de Voitures</h2>
            <p>Modèles 2025 WW disponibles dès maintenant.</p>
            <a href="#cars" class="btn-main">Choisir une voiture</a>
        </div>
    </header>

    <section id="cars" class="fleet-section">
        <h2 class="title" data-aos="fade-up">Notre Flotte <span class="red">WW</span></h2>
        <div id="cars-grid" class="grid-cars"></div>
    </section>

    <section id="contact" class="contact-section">
        <div class="form-container" data-aos="fade-up">
            <h2>Réserver Votre Voiture</h2>
            <form action="https://formspree.io/f/mgorkppa" method="POST">
                <label>Nom Complet</label>
                <input type="text" name="nom" placeholder="Votre nom" required>
                
                <label>N° de Téléphone</label>
                <input type="tel" name="phone" placeholder="06XXXXXXXX" required>
                
                <label>Voiture Choisie</label>
                <select name="voiture" id="voiture-select"></select>
                
                <div class="dates">
                    <div>
                        <label>Date Début</label>
                        <input type="date" name="debut" required>
                    </div>
                    <div>
                        <label>Date Fin</label>
                        <input type="date" name="fin" required>
                    </div>
                </div>
                
                <button type="submit" class="btn-submit">Confirmer la Réservation</button>
            </form>
        </div>
    </section>

    <footer>
        <div class="footer-content">
            <p>📍 Sidi Kacem, Maroc</p>
            <p class="phone-footer">📞 06 65 42 78 93 | 06 63 54 74 17</p>
            <div class="social-links">
                <a href="https://www.facebook.com/Boukilis.Cars" target="_blank" class="fb"><i class="fab fa-facebook"></i></a>
                <a href="https://www.instagram.com/boukilis.cars" target="_blank" class="ig"><i class="fab fa-instagram"></i></a>
            </div>
            <p class="copyright">© 2026 Boukili's Cars. Tous droits réservés.</p>
        </div>
    </footer>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init();

        const generateImages = (prefix, count, ext = "jpeg") => {
            let imgs = [];
            for(let i=1; i<=count; i++) { imgs.push(`${prefix}${i}.${ext}`); }
            return imgs;
        };

        const cars = [
            { name: "Peugeot 208 GT", images: generateImages("peugot208_", 9, "jpeg"), specs: "Automatique • Diesel • Sport", price: "400" },
            { name: "Kia Sportage", images: generateImages("kia-sportage", 4, "jpg"), specs: "Automatique • Diesel • Full Option", price: "400" },
            { name: "Peugeot 208 Allure", images: generateImages("allure", 7, "jpeg"), specs: "Manuelle • Diesel • Confort", price: "350" },
            { name: "Opel Mokka", images: generateImages("moka", 4, "jpg"), specs: "Automatique • Essence • 2025", price: "300" },
            { name: "Opel Corsa Manuelle", images: generateImages("opelacorsamanuelle", 6, "jpeg"), specs: "Manuelle • Diesel", price: "300" },
            { name: "Kia Picanto", images: generateImages("Kiapicanto", 8, "jpeg"), specs: "Manuelle • Essence", price: "250" },
            { name: "Kia Seltos", images: generateImages("Kiaseltos", 3, "jpg"), specs: "Automatique • Diesel", price: "300" },
            { name: "Renault Clio", images: generateImages("Renault Clio", 7, "jpeg"), specs: "Manuelle • Diesel", price: "350" }
        ];

        const grid = document.getElementById('cars-grid');
        const select = document.getElementById('voiture-select');

        function renderCars() {
            grid.innerHTML = '';
            select.innerHTML = '';
            cars.forEach((car, index) => {
                let opt = document.createElement('option');
                opt.value = car.name; opt.innerHTML = car.name;
                select.appendChild(opt);

                let thumbsHtml = car.images.map(imgSrc => 
                    `<img src="${imgSrc}" class="thumb-img" onclick="changeMainImg(${index}, '${imgSrc}')" onerror="this.style.display='none'">`
                ).join('');

                grid.innerHTML += `
                    <div class="car-card" data-aos="zoom-in">
                        <div class="img-container">
                            <img src="${car.images[0]}" id="main-img-${index}" class="main-car-img" onerror="this.src='logo.jpg'">
                            <div class="badge">Disponible</div>
                            <div class="price-tag">${car.price} DH<span>/jour</span></div>
                        </div>
                        <div class="car-info">
                            <h3>${car.name}</h3>
                            <div class="thumbs-container">${thumbsHtml}</div>
                            <p class="specs">${car.specs}</p>
                            <button onclick="scrollToForm('${car.name}')" class="btn-reserve">Réserver</button>
                        </div>
                    </div>`;
            });
        }

        function scrollToForm(carName) {
            select.value = carName;
            document.getElementById('contact').scrollIntoView({ behavior: 'smooth' });
        }

        function changeMainImg(carIndex, newSrc) {
            document.getElementById(`main-img-${carIndex}`).src = newSrc;
        }

        window.onload = renderCars;
    </script>
</body>
</html>
